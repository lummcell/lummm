<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOSMED DOWNLOADER 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e8e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff3b5c, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        /* ===== TOMBOL WHATSAPP ===== */
        .wa-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: #fff;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 999;
            text-decoration: none;
            transition: 0.3s;
        }
        .wa-float:hover { transform: scale(1.1); background: #1da851; }

        /* ===== PILIH PLATFORM ===== */
        .platform-select {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .platform-btn {
            padding: 10px 20px;
            background: #1a1a1e;
            border: 1px solid #2a2a2e;
            border-radius: 30px;
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            font-size: 14px;
        }
        .platform-btn:hover { border-color: #7c4dff; color: #fff; }
        .platform-btn.active {
            background: #7c4dff;
            color: #fff;
            border-color: #7c4dff;
        }

        /* ===== INPUT & DOWNLOAD ===== */
        .input-area {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a2a2e;
        }
        .input-area input {
            width: 100%;
            padding: 14px;
            background: #0f0f13;
            border: 1px solid #2a2a2e;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #7c4dff; }

        .input-area .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn-primary {
            background: #7c4dff;
            color: #fff;
        }
        .btn-primary:hover { background: #6a3ee0; }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a2a2e;
            color: #aaa;
        }
        .btn-outline:hover { border-color: #7c4dff; color: #fff; }

        /* ===== HASIL ===== */
        .result {
            display: none;
            margin-top: 20px;
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a2a2e;
            text-align: center;
        }
        .result img {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .result .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .result .download-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .result .download-links a {
            display: block;
            padding: 12px;
            background: #22c55e;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }
        .result .download-links a.mp3 {
            background: #007bff;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #2a2a2e;
            border-top: 4px solid #7c4dff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .header h1 { font-size: 22px; }
            .platform-btn { font-size: 12px; padding: 8px 14px; }
            .wa-float { width: 48px; height: 48px; font-size: 24px; bottom: 16px; right: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📥 SOSMED DOWNLOADER</h1>
            <p>Download Video TikTok, Instagram & YouTube Tanpa Watermark</p>
        </div>

        <!-- Tombol WhatsApp -->
        <a href="https://wa.me/6283130971335" class="wa-float" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>

        <!-- Pilih Platform -->
        <div class="platform-select" id="platformSelect">
            <button class="platform-btn active" onclick="setPlatform('tiktok')" data-platform="tiktok">TikTok</button>
            <button class="platform-btn" onclick="setPlatform('instagram')" data-platform="instagram">Instagram</button>
            <button class="platform-btn" onclick="setPlatform('youtube')" data-platform="youtube">YouTube</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="urlInput" placeholder="Tempel link video di sini..." />
            <div class="actions">
                <button class="btn btn-primary" onclick="processDownload()"><i class="fas fa-download"></i> Download</button>
                <button class="btn btn-outline" onclick="clearInput()">✖ Bersihkan</button>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader"></div>

        <!-- Result -->
        <div class="result" id="resultBox">
            <img id="thumbImage" src="" alt="Thumbnail" />
            <div class="title" id="videoTitle">Video siap diunduh!</div>
            <div class="download-links">
                <a href="#" id="downloadVideo" target="_blank"><i class="fas fa-video"></i> Download Video (HD)</a>
                <a href="#" id="downloadAudio" class="mp3" target="_blank"><i class="fas fa-music"></i> Download MP3</a>
            </div>
        </div>
    </div>

    <script>
        let currentPlatform = 'tiktok';

        function setPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.platform === platform) btn.classList.add('active');
            });
            document.getElementById('urlInput').placeholder = `Tempel link ${platform} di sini...`;
        }

        function clearInput() {
            document.getElementById('urlInput').value = '';
            document.getElementById('resultBox').style.display = 'none';
        }

        async function processDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return alert('Masukkan link terlebih dahulu!');

            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                let apiUrl = '';
                let videoData = null;

                if (currentPlatform === 'tiktok') {
                    apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
                    const res = await fetch(apiUrl);
                    const data = await res.json();
                    if (data.code === 0) {
                        videoData = {
                            title: data.data.title || 'TikTok Video',
                            video: data.data.play || data.data.wmplay,
                            audio: data.data.music,
                            cover: data.data.cover
                        };
                    }
                } else if (currentPlatform === 'instagram') {
                    apiUrl = `https://igdownloader.app/api/instagram?url=${encodeURIComponent(url)}`;
                    const res = await fetch(apiUrl);
                    const data = await res.json();
                    if (data.success) {
                        videoData = {
                            title: data.title || 'Instagram Video',
                            video: data.video_url,
                            audio: data.audio_url || null,
                            cover: data.thumbnail
                        };
                    }
                } else if (currentPlatform === 'youtube') {
                    apiUrl = `https://youtube-mp36.p.rapidapi.com/dl?id=${new URL(url).searchParams.get('v')}`;
                    // Demo: karena butuh API Key, kita pakai fallback dummy
                    videoData = {
                        title: 'YouTube Video',
                        video: url,
                        audio: url,
                        cover: 'https://via.placeholder.com/200'
                    };
                }

                if (!videoData) throw new Error('Gagal mengambil video');

                document.getElementById('thumbImage').src = videoData.cover || 'https://via.placeholder.com/200';
                document.getElementById('videoTitle').textContent = videoData.title.substring(0, 60);
                document.getElementById('downloadVideo').href = videoData.video || '#';
                document.getElementById('downloadAudio').href = videoData.audio || '#';

                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';

            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                alert('❌ Gagal mengambil video. Pastikan link benar.');
            }
        }
    </script>
</body>
</html>
